<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ session.csrf_token }}">
    <script>
        (function() {
            const originalFetch = window.fetch;
            window.fetch = async function(url, options = {}) {
                if (options.method && ['POST', 'PUT', 'DELETE', 'PATCH'].includes(options.method.toUpperCase())) {
                    options.headers = options.headers || {};
                    const token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
                    if (token) {
                        options.headers['X-CSRFToken'] = token;
                    }
                }
                return originalFetch(url, options);
            };
        })();
    </script>
    <title>Login - Attendance Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #f0f2f6 0%, #e2e8f0 100%);
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --white: #ffffff;
            --text-light: #1e293b;
            --text-muted: #64748b;
            --glass-bg: #ffffff;
            --glass-border: #cbd5e1;
            --input-bg: #f8fafc;
            --input-border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-grad);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Elements */
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(45px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-1 {
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            bottom: -100px;
            right: -100px;
        }

        .login-container {
            width: 450px;
            max-width: 95vw;
            background: var(--glass-bg);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            z-index: 10;
            animation: containerFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #0f172a, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title {
            text-align: center;
            font-size: 19px;
            font-weight: 500;
            margin-bottom: 32px;
            color: var(--text-muted);
        }

        .role-selector {
            display: flex;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
            gap: 4px;
        }

        .role-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .role-btn.active {
            background: var(--accent);
            color: var(--white);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--white);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            border: none;
            color: var(--white);
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 12px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            color: #dc2626;
            background: rgba(220, 38, 38, 0.06);
            border: 1px solid rgba(220, 38, 38, 0.15);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            display: none;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>

    <div class="login-container">
        <div class="brand-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
            </div>
            <h1 class="brand-name">AttendanceMS</h1>
        </div>

        <h2 class="title" id="loginTitle">Student Portal Login</h2>

        <div class="role-selector">
            <button type="button" class="role-btn active" id="btnStudent" onclick="selectRole('student')">Student</button>
            <button type="button" class="role-btn" id="btnAdmin" onclick="selectRole('admin')">Admin</button>
        </div>

        <div class="error-message" id="errorBox"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="hidden" id="loginRole" value="student">
            
            <div class="form-group">
                <label class="form-label" id="usernameLabel">Intern / Student ID</label>
                <input type="text" class="form-input" id="username" placeholder="e.g. INT001" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit">Sign In →</button>
        </form>

        <div class="forgot-password" id="loginHint">
            Default password is your <strong>Intern ID</strong>.
        </div>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('loginRole').value = role;
            const btnStudent = document.getElementById('btnStudent');
            const btnAdmin = document.getElementById('btnAdmin');
            const title = document.getElementById('loginTitle');
            const usernameLabel = document.getElementById('usernameLabel');
            const usernameInput = document.getElementById('username');
            const hint = document.getElementById('loginHint');

            if (role === 'student') {
                btnStudent.classList.add('active');
                btnAdmin.classList.remove('active');
                title.innerText = 'Student Portal Login';
                usernameLabel.innerText = 'Intern / Student ID';
                usernameInput.placeholder = 'e.g. INT001';
                hint.style.display = 'block';
            } else {
                btnAdmin.classList.add('active');
                btnStudent.classList.remove('active');
                title.innerText = 'Admin Control Panel';
                usernameLabel.innerText = 'Username / Email';
                usernameInput.placeholder = 'e.g. admin@attendance.com';
                hint.style.display = 'none';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('loginRole').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });
                
                const data = await response.json();

                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = '/admin/dashboard';
                    } else {
                        window.location.href = '/student/dashboard';
                    }
                } else {
                    errorBox.innerText = data.message || 'Invalid username or password.';
                    errorBox.style.display = 'block';
                }
            } catch (error) {
                errorBox.innerText = 'An error occurred. Please try again.';
                errorBox.style.display = 'block';
                console.error(error);
            }
        }
    </script>
</body>
</html>
