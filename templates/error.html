<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - AttendanceMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f6;
            --card-bg: #ffffff;
            --card-border: #dde3ed;
            --accent: #dc2626;
            --accent-glow: rgba(220, 38, 38, 0.15);
            --text-light: #111827;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 50% 50%, rgba(220, 38, 38, 0.05) 0px, transparent 50%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 80px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 0 4px 12px var(--accent-glow);
        }

        .error-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-home {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">{{ code }}</div>
        <h2 class="error-title">Access Denied / Error</h2>
        <p class="error-desc" id="errDesc">{{ message }}</p>
        <a href="/login" class="btn-home">Back to Login</a>
    </div>
</body>
</html>
